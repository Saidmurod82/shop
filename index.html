<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>INGCO Official Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; margin: 0; padding: 0; }
        .banner { margin: 12px; border: 1px solid #333; }
        .banner img { width: 100%; display: block; }
        .category-container { margin: 0 12px 8px 12px; }
        .category-btn {
            background: #222; color: #fff; width: 100%; padding: 15px; font-size: 11px; font-weight: bold;
            text-align: left; border: 1px solid #333; border-left: 5px solid #febd11;
            cursor: pointer; display: flex; justify-content: space-between;
        }
        .content { display: none; padding: 10px; background: #1a1a1a; border: 1px solid #333; }
    </style>
</head>
<body>
    <div class="banner"><img src="960.jpg" alt="INGCO"></div>
    
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">🛠 РУЧНЫЕ ИНСТРУМЕНТЫ / ҚЎЛ АСБОБЛАРИ <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">🔌 ЭЛЕКТРОИНСТРУМЕНТЫ / ЭЛЕКТР АСБОБЛАР <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">🔋 БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ / СИМСИЗ АСБОБЛАР <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">⚡ АККУМУЛЯТОРНЫЕ ИНСТРУМЕНТЫ 42V <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">📏 ИЗМЕРИТЕЛЬНЫЕ ИНСТРУМЕНТЫ / ЎЛЧОВ АСБОБЛАРИ <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">💨 ПНЕВМАТИЧЕСКИЕ ИНСТРУМЕНТЫ / ПНЕВМАТИК АСБОБЛАР <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">🌳 САДОВЫЕ ИНСТРУМЕНТЫ / БОҒ АСБОБЛАРИ <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>
    <div class="category-container">
        <button class="category-btn" onclick="toggle(this)">⚡ ГЕНЕРАТОРЫ / ГЕНЕРАТОРЛАР <span>▶</span></button>
        <div class="content">Товары будут добавлены...</div>
    </div>

    <script>
        window.Telegram.WebApp.expand();
        function toggle(btn) {
            let content = btn.nextElementSibling;
            let arrow = btn.querySelector('span');
            content.style.display = (content.style.display === "block") ? "none" : "block";
            arrow.innerText = (content.style.display === "block") ? "▼" : "▶";
        }
    </script>
</body>
</html>
