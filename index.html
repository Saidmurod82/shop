<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Official Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        .header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid #ffcc00; }
        .header h1 { margin: 0; font-size: 18px; color: #ffcc00; }
        .banner { margin: 10px; border: 1px solid #333; }
        .banner img { width: 100%; display: block; }
        .cat { background: #1e1e1e; margin: 0 10px 8px 10px; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; background: #252525; border: none; color: #fff; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .list { display: none; padding: 0; background: #1a1a1a; }
        .row { padding: 10px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .thumb { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; background: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>INGCO TOOLS</h1>
        <small>OFFICIAL DISTRIBUTOR UZBEKISTAN</small>
    </div>
    <div class="banner">
        <img src="960.jpg" alt="INGCO Banner">
    </div>
    <div id="app"></div>

    <script>
        const menu = {
            "🛠 РУЧНЫЕ ИНСТРУМЕНТЫ": [
                {name: "Плоскогубцы", img: "https://via.placeholder.com/50"},
                {name: "Отвертки", img: "https://via.placeholder.com/50"}
            ],
            "⚡ ЭЛЕКТРОИНСТРУМЕНТЫ": [
                {name: "Болгарка", img: "https://via.placeholder.com/50"},
                {name: "Дрель", img: "https://via.placeholder.com/50"}
            ],
            "🔋 БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ": [
                {name: "Шуруповерт CDLI2001", img: "https://via.placeholder.com/50"},
                {name: "Цепная пила CMLI20228", img: "https://www.ingconepal.com/wp-content/uploads/2024/05/CMLI20228-500x500.jpg"}
            ],
            "⚡ АККУМУЛЯТОРНЫЕ 42V": [
                {name: "УШМ 42V", img: "https://via.placeholder.com/50"},
                {name: "Гайковерт", img: "https://via.placeholder.com/50"}
            ],
            "📏 ИЗМЕРИТЕЛЬНЫЕ ИНСТРУМЕНТЫ": [
                {name: "Лазерный уровень", img: "https://via.placeholder.com/50"},
                {name: "Рулетка", img: "https://via.placeholder.com/50"}
            ],
            "💨 ПНЕВМАТИЧЕСКИЕ ИНСТРУМЕНТЫ": [
                {name: "Краскопульт", img: "https://via.placeholder.com/50"},
                {name: "Пневмогайковерт", img: "https://via.placeholder.com/50"}
            ],
            "🌳 САДОВЫЕ ИНСТРУМЕНТЫ": [
                {name: "Газонокосилка", img: "https://via.placeholder.com/50"},
                {name: "Триммер", img: "https://via.placeholder.com/50"}
            ],
            "⚙ ГЕНЕРАТОРЫ": [
                {name: "Бензиновый", img: "https://via.placeholder.com/50"},
                {name: "Дизельный", img: "https://via.placeholder.com/50"}
            ]
        };

        const app = document.getElementById('app');
        for (let cat in menu) {
            let items = menu[cat].map(i => `
                <div class="row">
                    <img src="${i.img}" class="thumb"> 
                    <span>${i.name}</span>
                </div>
            `).join('');

            app.innerHTML += `
                <div class="cat">
                    <button class="btn" onclick="t(this)">${cat} <span>▶</span></button>
                    <div class="list">${items}</div>
                </div>`;
        }

        function t(b) {
            let l = b.nextElementSibling;
            let s = b.querySelector('span');
            l.style.display = (l.style.display === "block") ? "none" : "block";
            s.innerText = (l.style.display === "block") ? "▼" : "▶";
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
