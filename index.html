        function showDetails(item) {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-name').innerText = item.name;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-price').innerText = item.price + " сум";
            document.getElementById('modal-overlay').style.display = "flex";
        }

        const app = document.getElementById('app');
        for (let cat in menu) {
            let itemsHTML = menu[cat].length > 0 
                ? menu[cat].map(i => `
                    <div class="card" onclick='showDetails(${JSON.stringify(i).replace(/'/g, "")})'>
                        ${i.discount ? '<div class="discount-badge">' + i.discount + '</div>' : ''}
                        <img src="${i.img}" alt="${i.name}">
                        <div class="name">${i.name}</div>
                        <div class="price">${i.old ? '<span class="old-price">'+i.old+' сум</span>' : ''}${i.price} сум</div>
                    </div>`).join('') 
                : '<div style="padding:15px; color:#666; font-size:12px;">Товары скоро появятся...</div>';

            app.innerHTML += `
                <button class="cat-btn" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display==='grid'?'none':'grid')">
                    ${cat} <span>▶</span>
                </button>
                <div class="grid">${itemsHTML}</div>`;
        }

        function filterProducts() {
            let query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                let name = card.querySelector('.name').innerText.toLowerCase();
                card.style.display = name.includes(query) ? 'block' : 'none';
            });
        }
