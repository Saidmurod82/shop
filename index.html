<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Official Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Общие стили каталога */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        .header-banner {
            text-align: center;
            margin-bottom: 15px;
        }
        .header-banner img {
            width: 100%;
            border-radius: 8px;
        }
        .category-title {
            background-color: #1e1e1e;
            color: #ffbc00;
            padding: 12px;
            margin: 15px 0 10px 0;
            border-left: 5px solid #ffbc00;
            font-size: 18px;
            font-weight: bold;
        }
        .products-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .product-card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            position: relative;
            cursor: pointer;
        }
        .badge-discount {
            position: absolute;
            top: 5px;
            left: 5px;
            background-color: #d9534f;
            color: white;
            font-size: 11px;
            padding: 3px 6px;
            border-radius: 4px;
            font-weight: bold;
        }
        .product-card img {
            max-width: 100%;
            height: 120px;
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 6px;
            padding: 5px;
        }
        .product-code {
            color: #888;
            font-size: 12px;
            margin: 5px 0 2px 0;
        }
        .product-title {
            font-size: 14px;
            margin: 0 0 5px 0;
            height: 35px;
            overflow: hidden;
        }
        .small-specs {
            font-size: 11px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .price-box {
            margin-bottom: 8px;
        }
        .old-price {
            text-decoration: line-through;
            color: #888;
            font-size: 12px;
            margin-right: 5px;
        }
        .current-price {
            color: #ffbc00;
            font-weight: bold;
            font-size: 15px;
        }
        .buy-button {
            background-color: #ffbc00;
            color: black;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* 🌟 СТИЛИ ДЛЯ КРУПНОГО МОДАЛЬНОГО ОКНА (ДЛЯ ЗРЕНИЯ) 🌟 */
        .modal {
            display: none; 
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); 
            overflow-y: auto;
        }
        .modal-content {
            background-color: #1e1e1e; 
            margin: 5% auto;
            padding: 20px;
            border: 2px solid #ffbc00; 
            width: 85%;
            max-width: 450px;
            border-radius: 12px;
            position: relative;
            color: #ffffff;
        }
        .close-button {
            position: absolute;
            right: 15px;
            top: 10px;
            color: #ffbc00;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-image-container {
            text-align: center;
            background-color: #ffffff; 
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }
        .modal-image-container img {
            max-width: 100%;
            max-height: 250px;
            object-fit: contain;
        }
        .modal-info h2 {
            font-size: 24px; 
            margin: 15px 0 10px 0;
            color: #ffbc00;
        }
        .modal-specs p {
            font-size: 19px; 
            line-height: 1.5;
            margin: 8px 0;
            color: #e0e0e0;
        }
        .modal-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 22px;
            gap: 12px;
        }
        .modal-price {
            font-size: 28px; 
            font-weight: bold;
            color: #ffbc00;
        }
        .modal-buy-button {
            background-color: #ffbc00;
            color: #000000;
            border: none;
            padding: 15px 30px;
            font-size: 18px; 
            font-weight: bold;
            border-radius: 6px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <h2 style="color: #ffbc00; margin: 5px 0;">INGCO TOOLS</h2>
        <p style="color: #888; margin: 0 0 10px 0; font-size: 12px;">OFFICIAL DISTRIBUTOR UZBEKISTAN</p>
        <img src="1779117457696.jpeg" alt="INGCO Banner">
    </div>

    <div class="category-title">БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ / СИМСИЗ АСБОБЛАР</div>
    
    <div class="products-grid">
        
        <div class="product-card" onclick="openProductModal('972.webp', 'Реноватор многофункциональный', 'CMLI20228', 'RU: 20V, 5000-20000 об/мин, 6 скоростей, угол 3.2°, насадки, 1 АКБ 2.0Ач, кейс.<br><br>UZ: 20V, 5000-20000 айл/мин, 6 тезлик, бурчак 3.2°, насадкалар, 1 та АКБ 2.0Ач, кейс.', '595,000 сум')">
            <div class="badge-discount">СКИДКА 15%</div>
            <img src="972.webp" alt="CMLI20228">
            <div class="product-code">CMLI20228</div>
            <h3 class="product-title">Реноватор многофункциональный</h3>
            <div class="small-specs">20V, 6 скоростей, 1 АКБ, Кейс</div>
            <div class="price-box">
                <span class="old-price">700,000 сум</span>
                <span class="current-price">595,000 сум</span>
            </div>
            <button class="buy-button">КУПИТЬ</button>
        </div>

        </div>


    <div id="product-modal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeProductModal()">&times;</span>
            <div class="modal-image-container">
                <img id="modal-product-img" src="" alt="Инструмент">
            </div>
            <div class="modal-info">
                <h2 id="modal-product-title">Название</h2>
                <div class="modal-specs">
                    <p><strong>Модель:</strong> <span id="modal-product-model"></span></p>
                    <p id="modal-product-desc">Описание...</p>
                </div>
                <div class="modal-footer">
                    <span id="modal-product-price" class="modal-price">0 сум</span>
                    <button class="modal-buy-button">КУПИТЬ / СОТИБ ОЛИШ</button>
                </div>
            </div>
        </div>
    </div>


    <script>
        function openProductModal(imageSrc, title, model, description, price) {
            document.getElementById('modal-product-img').src = imageSrc;
            document.getElementById('modal-product-title').innerText = title;
            document.getElementById('modal-product-model').innerText = model;
            document.getElementById('modal-product-desc').innerHTML = description;
            document.getElementById('modal-product-price').innerText = price;
            
            document.getElementById('product-modal').style.display = "block";
            document.body.style.overflow = "hidden"; 
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = "none";
            document.body.style.overflow = "auto"; 
        }

        window.onclick = function(event) {
            let modal = document.getElementById('product-modal');
            if (event.target == modal) {
                closeProductModal();
            }
        }
    </script>

</body>
</html>
