<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Official Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        /* Баннер и заголовки */
        .header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid #ffcc00; }
        .header h1 { margin: 0; font-size: 18px; color: #ffcc00; }
        .banner { margin: 10px; border: 1px solid #333; }
        .banner img { width: 100%; display: block; }
        
        /* Стили категорий */
        .cat { background: #1e1e1e; margin: 0 10px 8px 10px; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; background: #252525; border: none; color: #fff; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .list { display: none; padding: 10px; background: #1a1a1a; }
        .row { padding: 8px; border-bottom: 1px solid #333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>INGCO TOOLS</h1>
        <small>OFFICIAL DISTRIBUTOR UZBEKISTAN</small>
    </div>

    <div class="banner">
        <img src="960.jpg" alt="INGCO Banner">
    </div>

    <div id="app"></div>

    <script>
        const menu = {
            "🛠 РУЧНЫЕ ИНСТРУМЕНТЫ": ["Плоскогубцы", "Отвертки", "Ключи"],
            "⚡ ЭЛЕКТРОИНСТРУМЕНТЫ": ["Болгарки", "Дрели", "Перфораторы"],
            "🔋 БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ": [
    {
        name: "Шуруповерт CDLI2001",
        price: "750 000 сум",
        desc: "20V, Li-ion, 2 аккумулятора.",
        img: "drill.jpg" 
    },
    {
        name: "Многофункциональный инструмент CMLI20228",
        price: "Уточнить цену",
        desc: "20V Li-Ion, универсальный инструмент для резки и шлифовки.",
        img: "https://www.ingconepal.com/wp-content/uploads/2024/05/CMLI20228-500x500.jpg"
    }
],

            "⚡ АККУМУЛЯТОРНЫЕ 42V": ["УШМ 42V", "Гайковерты"],
            "📏 ИЗМЕРИТЕЛЬНЫЕ ИНСТРУМЕНТЫ": ["Лазерные уровни", "Рулетки"],
            "💨 ПНЕВМАТИЧЕСКИЕ ИНСТРУМЕНТЫ": ["Краскопульты", "Гайковерты"],
            "🌳 САДОВЫЕ ИНСТРУМЕНТЫ": ["Газонокосилки", "Триммеры"],
            "⚙ ГЕНЕРАТОРЫ": ["Бензиновые", "Дизельные"]
        };
        const app = document.getElementById('app');
        for (let cat in menu) {
            app.innerHTML += `<div class="cat"><button class="btn" onclick="t(this)">${cat} <span>▶</span></button><div class="list">${menu[cat].map(i => `<div class="row">${i}</div>`).join('')}</div></div>`;
        }
        function t(b) {
            let l = b.nextElementSibling;
            let s = b.querySelector('span');
            l.style.display = (l.style.display === "block") ? "none" : "block";
            s.innerText = (l.style.display === "block") ? "▼" : "▶";
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
