<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Official Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        .header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid #ffcc00; }
        .cat { background: #1e1e1e; margin: 8px; border-radius: 6px; border: 1px solid #333; }
        .btn { width: 100%; padding: 14px; background: #252525; border: none; color: #fff; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .list { display: none; padding: 0; background: #1a1a1a; }
        .row { padding: 10px; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px; }
        .thumb { width: 40px; height: 40px; object-fit: contain; background: #000; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header"><h1>INGCO TOOLS</h1></div>
    <div id="app"></div>

    <script>
        const menu = {
            "🛠 РУЧНЫЕ ИНСТРУМЕНТЫ": ["Плоскогубцы", "Отвертки", "Ключи"],
            "⚡ ЭЛЕКТРОИНСТРУМЕНТЫ": ["Болгарка", "Дрель", "Перфоратор"],
            "🔋 БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ": [
                {name: "Шуруповерт CIDLI20558", img: "https://www.ingco.com/file/product/20240416/CIDLI20558.jpg"},
                {name: "Шуруповерт CDLI2001", img: ""},
                {name: "Цепная пила CMLI20228", img: "https://www.ingconepal.com/wp-content/uploads/2024/05/CMLI20228-500x500.jpg"}
            ],
            "⚡ АККУМУЛЯТОРНЫЕ 42V": ["УШМ 42V", "Гайковерт"],
            "📏 ИЗМЕРИТЕЛЬНЫЕ ИНСТРУМЕНТЫ": ["Лазерный уровень", "Рулетка"],
            "💨 ПНЕВМАТИЧЕСКИЕ ИНСТРУМЕНТЫ": ["Краскопульт", "Пневмогайковерт"],
            "🌳 САДОВЫЕ ИНСТРУМЕНТЫ": ["Газонокосилка", "Триммер"],
            "⚙ ГЕНЕРАТОРЫ": ["Бензиновый", "Дизельный"]
        };

        const app = document.getElementById('app');
        for (let cat in menu) {
            let items = menu[cat].map(i => {
                let name = typeof i === 'string' ? i : i.name;
                let img = (typeof i === 'object' && i.img) ? `<img src="${i.img}" class="thumb" loading="lazy">` : `<div class="thumb"></div>`;
                return `<div class="row">${img} <span>${name}</span></div>`;
            }).join('');

            app.innerHTML += `
                <div class="cat">
                    <button class="btn" onclick="t(this)">${cat} <span>▶</span></button>
                    <div class="list">${items}</div>
                </div>`;
        }

        function t(b) {
            let l = b.nextElementSibling;
            l.style.display = (l.style.display === "block") ? "none" : "block";
            b.querySelector('span').innerText = (l.style.display === "block") ? "▼" : "▶";
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
