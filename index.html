<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO TOOLS - IZZA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        .header-banner { text-align: center; margin-bottom: 15px; }
        .header-banner img { width: 100%; border-radius: 8px; }
        .brand-info { text-align: center; margin: 10px 0; }
        .brand-info h2 { color: #ffbc00; margin: 0; font-size: 20px; }
        .brand-info p { color: #888; font-size: 11px; margin: 5px 0; }
        .lang-switch { text-align: center; font-size: 11px; color: #888; margin-bottom: 15px; }
        .category-accordion { background-color: #1e1e1e; color: #fff; cursor: pointer; padding: 15px; width: 100%; border: none; text-align: left; margin-bottom: 8px; border-radius: 4px; border-left: 5px solid #ffbc00; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; }
        .category-panel { padding: 0 5px; display: none; margin-bottom: 15px; }
        .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .product-card { background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 10px; text-align: center; }
        .product-card img { width: 100%; height: 100px; object-fit: contain; background: #fff; border-radius: 6px; }
        .product-title { font-size: 12px; margin: 8px 0; height: 30px; overflow: hidden; }
        .current-price { color: #ffbc00; font-weight: bold; margin-bottom: 8px; }
        .buy-button { background-color: #ffbc00; border: none; padding: 8px; width: 100%; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header-banner"><img src="960.jpg" alt="INGCO Banner"></div>
<div class="brand-info"><h2>INGCO TOOLS</h2><p>OFFICIAL DISTRIBUTOR UZBEKISTAN</p></div>
<div class="lang-switch">RU 🇷🇺 / UZ 🇺🇿 TEKST</div>

<button class="category-accordion">🛠️ РУЧНЫЕ ИНСТРУМЕНТЫ / ҚЎЛ АСБОБЛАРИ <span>▶</span></button>
<div class="category-panel"><div class="products-grid"></div></div>

<button class="category-accordion">🔌 ЭЛЕКТРОИНСТРУМЕНТЫ / ЭЛЕКТР АСБОБЛАР <span>▶</span></button>
<div class="category-panel"><div class="products-grid"></div></div>

<button class="category-accordion">🔋 БЕСПРОВОДНЫЕ ИНСТРУМЕНТЫ / СИМСИЗ АСБОБЛАР <span>▼</span></button>
<div class="category-panel" style="display: block;">
    <div class="products-grid">
        <div class="product-card"><img src="cdli20453.webp" alt="Дрель"><div class="product-title">Дрель-шуруповерт 20V</div><div class="current-price">850,000 сум</div><button class="buy-button">КУПИТЬ</button></div>
        <div class="product-card"><img src="cgsli20882.webp" alt="Пила"><div class="product-title">Аккумуляторная пила 8"</div><div class="current-price">775,000 сум</div><button class="buy-button">КУПИТЬ</button></div>
        <div class="product-card"><img src="972.webp" alt="Реноватор"><div class="product-title">Реноватор 20V</div><div class="current-price">595,000 сум</div><button class="buy-button">КУПИТЬ</button></div>
    </div>
</div>

<button class="category-accordion">⚡ АККУМУЛЯТОРНЫЕ 42V <span>▶</span></button>
<div class="category-panel"><div class="products-grid"></div></div>

<script>
    const acc = document.getElementsByClassName("category-accordion");
    for (let i = 0; i < acc.length; i++) {
        acc[i].addEventListener("click", function() {
            const panel = this.nextElementSibling;
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        });
    }
</script>
</body>
</html>
