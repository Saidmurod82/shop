<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Store Tashkent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #111; color: #fff; margin: 0; padding: 0; padding-bottom: 30px; -webkit-user-select: none; }
        
        /* Шапка */
        header { text-align: center; padding: 15px 0; background: #000; border-bottom: 3px solid #febd11; }
        header h1 { color: #febd11; margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; font-weight: 900; }
        header p { margin: 3px 0 0 0; font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Рекламный баннер - обновлен стиль для новой картинки */
        .banner {
            margin: 12px;
            padding: 0;
            border-radius: 4px;
            box-shadow: 0 4px 15px rgba(254, 189, 17, 0.2);
            overflow: hidden;
            border: 1px solid #333;
        }
        .banner img {
            width: 100%;
            height: auto;
            display: block;
        }

        .lang-notice { text-align: center; font-size: 10px; color: #666; margin-bottom: 10px; text-transform: uppercase; margin-top: 10px; }

        /* Категории (Аккордеон) */
        .category-container { margin: 0 12px 10px 12px; }
        
        .category-btn {
            background: #222;
            color: #fff;
            width: 100%;
            padding: 15px;
            font-size: 12px;
            font-weight: 700;
            text-align: left;
            border: 1px solid #333;
            border-left: 5px solid #febd11;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            text-transform: uppercase;
        }
        .category-btn:active { background: #2a2a2a; }
        .category-btn .arrow { color: #febd11; font-size: 14px; transition: transform 0.2s; }
        .category-btn.active .arrow { transform: rotate(90deg); }

        /* Выпадающий список товаров */
        .category-content {
            display: none;
            background: #161616;
            padding: 12px 6px;
            border: 1px solid #333;
            border-top: none;
        }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        /* Карточка товара */
        .card { background: #1f1f1f; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #2a2a2a; }
        .card .img-container { width: 100%; height: 120px; background: #ffffff; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .card img { max-width: 90%; max-height: 90%; object-fit: contain; }
        
        .card .sku { font-size: 9px; color: #febd11; margin: 0 0 4px 0; font-weight: bold; }
        .card h3 { font-size: 11px; margin: 0 0 6px 0; height: 32px; overflow: hidden; color: #fff; line-height: 1.3; font-weight: 600; }
        
        /* Описание на двух языках */
        .card .description-box { font-size: 9px; color: #ccc; margin-bottom: 8px; line-height: 1.3; border-top: 1px solid #333; padding-top: 4px; }
        .card .description-box .uz { color: #999; font-style: italic; margin-top: 2px; }

        .card .price { font-weight: 700; color: #febd11; font-size: 13px; margin-bottom: 8px; }
        
        .btn { background: #febd11; color: #000; border: none; padding: 8px; font-weight: 700; cursor: pointer; font-size: 10px; text-transform: uppercase; width: 100%; letter-spacing: 0.5px; }
        .btn:active { background: #c9960e; }
    </style>
</head>
<body>

    <header>
        <h1>INGCO TOOLS</h1>
        <p>Professional Tools Made Affordable</p>
    </header>

    <div class="banner">
        <img src="distributor_banner.jpg" alt="ИНСТРУМЕНТ INGCO ОФИЦИАЛЬНЫЙ ДИСТРИБЬЮТОР УЗБЕКИСТАН">
    </div>

    <div class="lang-notice">RU 🇷🇺 / UZ 🇺🇿 Текст</div>

    <div class="category-container">
        <button class="category-btn" onclick="toggleCategory(this, 'cat1')">
            <span>🔋 Аккумуляторный инструмент / Аккумуляторли асбоблар</span>
            <span class="arrow">▶</span>
        </button>
        <div id="cat1" class="category-content" style="display:block;">
            <div class="grid">
                <div class="card">
                    <div class="img-container">
                        <img src="CDLI200528.jpg">
                    </div>
                    <div class="sku">CDLI200528</div>
                    <h3>Дрель-шуруповерт аккумуляторная 20V</h3>
                    <div class="description-box">
                        <div class="ru"><b>RU:</b> 45Нм, 2 скорости, кейс, 2 аккумулятора 2.0Ач, 47 аксессуаров.</div>
                        <div class="uz"><b>UZ:</b> 45Нм, 2 тезлик, кейс, 2 та аккумулятор 2.0Ач, 47 та асбоблар.</div>
                    </div>
                    <div class="price">750,000 сум</div>
                    <button class="btn" onclick="orderProduct('Шуруповерт CDLI200528 20V')">Купить / Сотиб олиш</button>
                </div>
                </div>
        </div>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 
        
        function toggleCategory(btn, id) {
            btn.classList.toggle('active');
            let content = document.getElementById(id);
            if (content.style.display === "block") {
                content.style.display = "none";
                btn.querySelector('.arrow').innerText = "▶";
            } else {
                content.style.display = "block";
                btn.querySelector('.arrow').innerText = "▼";
            }
        }

        function orderProduct(name) {
            tg.sendData("order:" + name); 
            tg.close();
        }
    </script>
</body>
</html>
