<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #121212; color: #fff; margin: 0; padding-bottom: 80px; }
        .header { text-align: center; padding: 15px; background: #000; border-bottom: 2px solid #ffcc00; position: sticky; top: 0; z-index: 100; font-weight: bold; font-size: 18px; }
        .banner { width: 100%; display: block; border-bottom: 2px solid #ffcc00; }
        .cat-btn { width: 100%; padding: 16px; background: #252525; border: none; border-bottom: 1px solid #333; color: #fff; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: none; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; background: #1a1a1a; }
        .card { background: #252525; padding: 8px; border-radius: 6px; text-align: center; border: 1px solid #333; position: relative; cursor: pointer; transition: transform 0.2s; }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; height: 100px; object-fit: contain; background: #fff; border-radius: 4px; margin-bottom: 5px; }
        .discount-badge { position: absolute; top: 8px; left: 8px; background: #ff0000; color: #fff; font-size: 9px; font-weight: bold; padding: 2px 5px; border-radius: 3px; z-index: 10; }
        .name { font-size: 11px; height: 32px; overflow: hidden; font-weight: bold; margin-bottom: 5px; line-height: 1.2; }
        .price { color: #ffcc00; font-size: 13px; font-weight: bold; }
        .old-price { color: #888; text-decoration: line-through; font-size: 10px; display: block; }
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal { background: #252525; padding: 20px; border-radius: 10px; width: 85%; border: 1px solid #ffcc00; text-align: center; position: relative; }
        .modal img { width: 100%; max-height: 220px; object-fit: contain; background: #fff; border-radius: 6px; margin-bottom: 15px; transition: transform 0.3s ease; cursor: zoom-in; }
        .modal img:active { transform: scale(1.5); cursor: zoom-out; }
        .modal-price { font-size: 22px; color: #ffcc00; font-weight: bold; margin: 10px 0; }
        .order-btn { background: #ffcc00; border: none; padding: 14px; border-radius: 5px; font-weight: bold; width: 100%; color: #000; margin-top: 15px; cursor: pointer; font-size: 14px; }
        .footer-buttons { display: flex; padding: 10px; background: #000; border-top: 2px solid #ffcc00; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; z-index: 999; }
        .footer-buttons button { flex: 1; margin: 0 5px; padding: 12px; background: #ffcc00; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; color: #000; }
    </style>
</head>
<body>
    <div class="header">INGCO TOOLS</div>
    <img src="https://raw.githubusercontent.com/Saidmurod82/shop/main/1060.jpg" class="banner" alt="INGCO">

    <div class="footer-buttons">
        <button onclick="alert('Адрес: Рынок Изза Курилиш, магазин INGCO 1/12')">📍 Адрес</button>

        <div class="modal">

            <h3 id="m-name" style="margin: 5px 0;"></h3>

            <div class="modal-price" id="m-price"></div>
            <button class="order-btn" onclick="window.location.href='tel:+998903553377'">СВЯЗАТЬСЯ С МЕНЕДЖЕРОМ</button>
            <p style="margin-top:20px; font-size:12px; color:#888; cursor:pointer;" onclick="document.getElementById('modal-overlay').style.display='none'">ЗАКРЫТЬ</p>
        </div>
    </div>

                {name: "Комбинированные плоскогубцы 8-в-1 HCCP58200", desc: "Размер: 8 дюймов (200 мм).", price: "73 000", old: "85 000", discount: "Скидка 11%", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1115.webp"}
            ],

                {name: "Аккумуляторная ударная дрель CIDLI20558", desc: "Компактная бесщеточная дрель P20S.", price: "600 000", old: "670 000", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1099.jpg"},
                {name: "Компактная бесщеточная дрель CDLI20668", desc: "Бесщеточная дрель P20S.", price: "675 000", old: "795 000", discount: "Скидка 15%", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1100.jpg"},
                {name: "Компактная бесщеточная ударная дрель CIDLI20768", desc: "Бесщеточная дрель P20S, 76 Нм.", price: "750 000", old: "860 000", discount: "Скидка 12%", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1116.webp"},

                {name: "Аккумуляторный гайковерт INGCO CIWLI20135", desc: "INDUSTRIAL, 20В, 1/2 дюйма, 1350 Нм, бесщеточный двигатель, 3 режима скорости, LED подсветка.", price: "2 720 000", old: "3 150 000", discount: "Скидка 13%", img: "https://static.insales-cdn.com/images/products/1/6434/1024309538/CIWLI20135.jpg"},
                {name: "Аккумуляторная угловая шлифмашина INGCO CAGLI271532", desc: "INDUSTRIAL, 20В, 125мм, бесщеточный двигатель, 3 режима скорости, эргономичный корпус.", price: "720 000", old: "850 000", discount: "Скидка 15%", img: "https://ingcomoldova.md/wp-content/uploads/2025/05/CAGLI271532.webp"},

            ],
            "🧰 НАБОРЫ БЕСПРОВОДНЫХ ИНСТРУМЕНТОВ": [ 
                {name: "Набор 4 в 1 INGCO COSLI250608", desc: "Набор из 4 инструментов (дрель, гайковерт, термофен, фонарь) + 2 акб 5.0Ач.", price: "3 140 000", old: "3 700 000", discount: "Скидка 15%", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1164.webp"},
                {name: "Набор 3 в 1 INGCO COSLI250386", desc: "Набор из 3 ударных гайковертов (3/4 и 1/2) + 2 аккумулятора 5.0Ач, зарядное устройство и комплект головок.", price: "3 200 000", old: "3 900 000", discount: "Скидка 18%", img: "https://raw.githubusercontent.com/Saidmurod82/shop/main/1165.webp"},
                {name: "Набор INGCO CKLI20766", desc: "Комплект: бесщеточная дрель (66 Нм, 13 мм) + мини-отрезная машина (76 мм). В комплекте 2 АКБ 2.0Ач, зарядка, кейс и 47 аксессуаров.", price: "950 000", old: "1 05 0000", discount: "Скидка 13%", img: "https://ingcomoldova.md/wp-content/uploads/2025/10/CKLI20766.webp"},

                {name: "Набор инструментов INGCO HKTHP31521 (152 предмета)", desc: "Комплект профессионального инструмента в кейсе: ключи, торцевые головки, трещотки, отвертки и биты.", price: "1 940 000", old: "2 250 000", discount: "Скидка 14%", img: "https://ingcomoldova.md/wp-content/uploads/2025/05/HKTHP31521.webp"},
            ],
            "🔧 НАБОР ИНСТРУМЕНТОВ": [],
            "💦 НАСОСЫ И КЕРЧЕРЫ": [],
            "⚡ ЭЛЕКТРОИНСТРУМЕНТЫ": [],
            "⚡ АККУМУЛЯТОРНЫЕ 42V": [],
            "🧳 ЯШИКИ ДЛЯ ИНСТРУМЕНТОВ": [],
            "📏 ИЗМЕРИТЕЛЬНЫЕ ИНСТРУМЕНТЫ": [],
            "💨 ПНЕВМАТИЧЕСКИЕ ИНСТРУМЕНТЫ": [],
            "🌳 САДОВЫЕ ИНСТРУМЕНТЫ": [],
            "⚙ ГЕНЕРАТОРЫ": [],
        };

        function showDetails(item) {
            document.getElementById('m-img').src = item.img;
            document.getElementById('m-name').innerText = item.name;
            document.getElementById('m-desc').innerText = item.desc;
            document.getElementById('m-price').innerText = item.price + " сум";
            document.getElementById('modal-overlay').style.display = "flex";
        }

        const app = document.getElementById('app');
        for (let cat in menu) {
            let itemsHTML = menu[cat].length > 0 
                ? menu[cat].map(i => `
                    <div class="card" onclick='showDetails(${JSON.stringify(i).replace(/'/g, "&#39;")})'>
                        ${i.discount ? '<div class="discount-badge">' + i.discount + '</div>' : ''}
                        <img src="${i.img}" alt="${i.name}">
                        <div class="name">${i.name}</div>
                        <div class="price">${i.old ? '<span class="old-price">'+i.old+' сум</span>' : ''}${i.price} сум</div>
                    </div>`).join('') 
                : '<div style="padding:15px; color:#666; font-size:12px;">Товары скоро появятся...</div>';

            app.innerHTML += `
                <button class="cat-btn" onclick="this.nextElementSibling.style.display=(this.nextElementSibling.style.display==='grid'?'none':'grid')">
                    ${cat} <span>▶</span>
                </button>
                <div class="grid">${itemsHTML}</div>`;
        }
        window.Telegram.WebApp.ready();
    </script>
</body>
</html>
