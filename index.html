<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; margin: 0; padding: 10px; }
        .cat { background: #1e1e1e; margin-bottom: 8px; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; background: #252525; border: none; color: #ffcc00; text-align: left; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; }
        .list { display: none; padding: 10px; background: #1a1a1a; }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; font-size: 13px; }
    </style>
</head>
<body>
    <div id="catalog"></div>
    <script>
        const data = {
            "🛠 РУЧНЫЕ ИНСТРУМЕНТЫ": ["Плоскогубцы - 65 000 сум", "Молоток - 45 000 сум"],
            "⚡ ЭЛЕКТРОИНСТРУМЕНТЫ": ["Болгарка AG9508 - 480 000 сум", "Дрель ID5008 - 350 000 сум"],
            "🔋 АККУМУЛЯТОРНЫЕ": ["Шуруповерт 20V - 750 000 сум"],
            "⚙ ГЕНЕРАТОРЫ": ["Бензиновый 2.5кВт - 3 200 000 сум"]
        };
        const catDiv = document.getElementById('catalog');
        for (let name in data) {
            catDiv.innerHTML += `<div class="cat"><button class="btn" onclick="t(this)">${name} <span>▶</span></button><div class="list">${data[name].map(i => `<div class="row">${i}</div>`).join('')}</div></div>`;
        }
        function t(b) {
            let l = b.nextElementSibling;
            let s = b.querySelector('span');
            l.style.display = (l.style.display === "block") ? "none" : "block";
            s.innerText = (l.style.display === "block") ? "▼" : "▶";
        }
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
